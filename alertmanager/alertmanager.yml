# Null-receiver: алерты видны в Prometheus и Alertmanager UI, но никуда
# не пересылаются. Для интеграции добавить email_configs / webhook_configs
# и поменять receiver в route.

route:
  receiver: 'null'
  group_by: ['alertname', 'severity']
  group_wait: 10s
  group_interval: 30s
  repeat_interval: 1h

receivers:
  - name: 'null'
