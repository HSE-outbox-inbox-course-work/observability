# Alertmanager на стенде нужен в первую очередь как формальная демонстрация:
# Prometheus умеет маршрутизировать алерты, а не просто показывать их в UI.
# Реальная доставка в email/Slack/Telegram не нужна — поэтому единственный
# receiver — null, без интеграций.
#
# При желании достаточно прописать webhook_configs / email_configs здесь.

route:
  receiver: 'null'
  group_by: ['alertname', 'severity']
  group_wait: 10s
  group_interval: 30s
  repeat_interval: 1h

receivers:
  - name: 'null'
