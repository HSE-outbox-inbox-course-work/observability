# Кастомные запросы для postgres_exporter поверх outbox-БД.
# Стандартные коллекторы postgres_exporter уже отдают pg_stat_user_tables_*,
# pg_stat_database_*, pg_replication_slots_* - этого достаточно для большинства
# алертов. Здесь добавляем только то, чего нет изначально:
# 1. Возраст самого старого события в outbox (приложение тоже его
# экспортирует, но дублирование на стороне БД помогает быстро
# сравнить, не врёт ли воркер).
# 2. Гранулярный счёт по статусам outbox - пригодится на ветке main
# (worker-impl), где у таблицы есть колонка status.

pg_outbox_age:
  query: |
    SELECT
      COALESCE(EXTRACT(EPOCH FROM (now() - MIN(created_at))), 0) AS oldest_event_age_seconds,
      COUNT(*) AS rows_total
    FROM outbox
  master: true
  metrics:
    - oldest_event_age_seconds:
        usage: "GAUGE"
        description: "Возраст (секунды) самого старого события в outbox по данным самой БД."
    - rows_total:
        usage: "GAUGE"
        description: "Количество строк в outbox по данным самой БД."
