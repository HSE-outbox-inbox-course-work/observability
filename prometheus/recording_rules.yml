# Recording rules: производные показатели поверх сырых метрик. Считаются
# в Prometheus, чтобы дашборды и алерты не пересчитывали rate / histogram_quantile
# на каждом запросе.

groups:
  - name: delivery.recording
    interval: 30s
    rules:

      - record: outbox:http_requests:rate5m
        expr: sum by (route, status) (rate(outbox_http_requests_total[5m]))

      - record: outbox:http_errors:ratio5m
        expr: |
          sum by (route) (
            rate(outbox_http_requests_total{status=~"4..|5.."}[5m])
          )
          /
          sum by (route) (rate(outbox_http_requests_total[5m]))

      - record: outbox:http_latency:p99_5m
        expr: |
          histogram_quantile(0.99,
            sum by (route, le) (rate(outbox_http_request_duration_seconds_bucket[5m]))
          )

      - record: inbox:processing:rate5m
        expr: sum by (outcome) (rate(inbox_messages_processed_total[5m]))

      - record: inbox:duplicate_ratio:5m
        expr: |
          sum(rate(inbox_duplicates_total[5m]))
          /
          clamp_min(sum(rate(inbox_kafka_messages_read_total{outcome="ok"}[5m])), 0.001)

      - record: inbox:dlq_ratio:5m
        expr: |
          sum(rate(inbox_dlq_messages_total{outcome="ok"}[5m]))
          /
          clamp_min(sum(rate(inbox_kafka_messages_read_total{outcome="ok"}[5m])), 0.001)

      - record: inbox:e2e_latency:p99_5m
        expr: |
          histogram_quantile(0.99,
            sum by (le) (rate(inbox_delivery_e2e_latency_seconds_bucket[5m]))
          )

      - record: inbox:e2e_latency:p95_5m
        expr: |
          histogram_quantile(0.95,
            sum by (le) (rate(inbox_delivery_e2e_latency_seconds_bucket[5m]))
          )
