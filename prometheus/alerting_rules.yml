groups:

  - name: availability
    rules:

      - alert: ServiceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Service {{ $labels.job }} is down"
          description: "Prometheus не получает метрики от {{ $labels.job }} ({{ $labels.instance }}) дольше минуты."

  - name: delivery
    rules:

      - alert: InboxConsumerLagHigh
        # > 100 не доставленных в обработку сообщений в течение 2 минут.
        expr: kafka_consumergroup_lag{consumergroup="inbox-service"} > 100
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Inbox kafka consumer is lagging behind"
          description: "Lag={{ $value }} сообщений на topic={{ $labels.topic }}."

      - alert: DLQRateHigh
        # > 1 dead-letter в секунду на 5-минутном окне.
        expr: sum(rate(inbox_dlq_messages_total{outcome="ok"}[5m])) > 1
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "DLQ production rate is high"
          description: "В DLQ уходит {{ $value | printf \"%.2f\" }} msg/s."

      - alert: E2ELatencyP99High
        # SLO: p99 ≤ 30 секунд.
        expr: inbox:e2e_latency:p99_5m > 30
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "E2E delivery latency p99 > 30s"
          description: "p99={{ $value | printf \"%.2f\" }}s — нарушение SLO."

  - name: postgres
    rules:

      - alert: OutboxDeadTuplesHigh
        # Высокий показатель dead tuples намекает, что autovacuum не успевает.
        expr: pg_stat_user_tables_n_dead_tup{relname="outbox"} > 50000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "outbox dead tuples > 50k"
          description: "n_dead_tup={{ $value }}. autovacuum, скорее всего, не успевает."

      - alert: ReplicationSlotLagBytes
        # Глубина «недоставленных» данных = WAL, который ещё держит slot.
        # На CDC-варианте это и есть основной сигнал «Debezium встал».
        expr: pg_replication_slots_pg_wal_lsn_diff > 256 * 1024 * 1024
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "PostgreSQL replication slot lag > 256 MB"
          description: "slot={{ $labels.slot_name }}, lag={{ $value }} bytes. Возможна остановка Debezium."
