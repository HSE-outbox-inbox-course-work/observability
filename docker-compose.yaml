name: course-work

services:

  # Базы данных

  postgres:
    image: postgres:16
    container_name: postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: payments-service-db
    ports:
      - "5432:5432"
    # wal_level=logical обязателен для Debezium (logical replication).
    command: >
      postgres
      -c wal_level=logical
      -c max_wal_senders=10
      -c max_replication_slots=10
    volumes:
      - postgres_outbox_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d payments-service-db"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres-inbox:
    image: postgres:16
    container_name: postgres-inbox
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: inbox
    ports:
      - "5433:5432"
    volumes:
      - postgres_inbox_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d inbox"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres-dlq:
    image: postgres:16
    container_name: postgres-dlq
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: dead_letter_queue
    ports:
      - "5434:5432"
    volumes:
      - postgres_dlq_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test -d dead_letter_queue"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Kafka

  kafka:
    image: confluentinc/cp-kafka:latest
    container_name: kafka
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      CLUSTER_ID: kafka-cluster
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_NODE_ID: 1
      KAFKA_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://0.0.0.0:29092,CONTROLLER://kafka:29093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server kafka:9092 >/dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 20

  kafka-init:
    image: confluentinc/cp-kafka:latest
    container_name: kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        kafka-topics --bootstrap-server kafka:9092 \
          --create --if-not-exists \
          --topic accounts.money.transferred \
          --partitions 1 --replication-factor 1
        kafka-topics --bootstrap-server kafka:9092 \
          --create --if-not-exists \
          --topic dead-letter-queue \
          --partitions 1 --replication-factor 1
    restart: "no"

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8081:8080"
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092

  kafka-connect:
    image: debezium/connect:2.5
    container_name: kafka-connect
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    ports:
      - "8083:8083"
    environment:
      BOOTSTRAP_SERVERS: kafka:9092
      GROUP_ID: 1
      CONFIG_STORAGE_TOPIC: my_connect_configs
      OFFSET_STORAGE_TOPIC: my_connect_offsets
      STATUS_STORAGE_TOPIC: my_connect_statuses
      KEY_CONVERTER_SCHEMAS_ENABLE: "false"
      VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
      VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_PLUGIN_PATH: /kafka/connect
    healthcheck:
      test: ["CMD-SHELL", "curl -sf localhost:8083/ >/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 30

  # Микросервисы 

  outbox:
    build:
      context: ../outbox-payments-service
    container_name: outbox
    ports:
      - "8080:8080"
    environment:
      OUTBOX_POSTGRES_CONN_STRING: >-
        host=postgres port=5432 user=admin password=password
        dbname=payments-service-db sslmode=disable
        pool_min_conns=5 pool_max_conns=10
        pool_max_conn_idle_time=5m pool_max_conn_lifetime=5m
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- localhost:8080/metrics >/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 20

  inbox:
    build:
      context: ../Inbox
    container_name: inbox
    ports:
      # 8082 наружу, 8080 внутри — внешний порт отличается от outbox.
      - "8082:8080"
    environment:
      INBOX_DB_DSN: "postgres://postgres:postgres@postgres-inbox:5432/inbox?sslmode=disable"
      INBOX_KAFKA_BROKER: "kafka:9092"
      INBOX_KAFKA_TOPIC: "accounts.money.transferred"
      INBOX_DLQ_TOPIC: "dead-letter-queue"
      INBOX_METRICS_ADDR: ":8080"
    depends_on:
      postgres-inbox:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- localhost:8080/metrics >/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 20

  # SPRING_* env-переменные переопределяют localhost-адреса из application.yaml
  # без правки самого файла.
  dlq:
    build:
      context: ../dlq-service
    container_name: dlq
    ports:
      - "8084:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-dlq:5432/dead_letter_queue
      SPRING_DATASOURCE_USERNAME: test
      SPRING_DATASOURCE_PASSWORD: test
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_KAFKA_CONSUMER_GROUP_ID: dlq-group
    depends_on:
      postgres-dlq:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully

  # Инфраструктурные экспортёры для Prometheus

  postgres-exporter-outbox:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: postgres-exporter-outbox
    environment:
      DATA_SOURCE_NAME: "postgresql://admin:password@postgres:5432/payments-service-db?sslmode=disable"
    ports:
      - "9187:9187"
    depends_on:
      postgres:
        condition: service_healthy

  postgres-exporter-inbox:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: postgres-exporter-inbox
    environment:
      DATA_SOURCE_NAME: "postgresql://postgres:postgres@postgres-inbox:5432/inbox?sslmode=disable"
    ports:
      - "9188:9187"
    depends_on:
      postgres-inbox:
        condition: service_healthy

  kafka-exporter:
    image: danielqsj/kafka-exporter:latest
    container_name: kafka-exporter
    command:
      - --kafka.server=kafka:9092
    ports:
      - "9308:9308"
    depends_on:
      kafka:
        condition: service_healthy

  # Мониторинг

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/recording_rules.yml:/etc/prometheus/recording_rules.yml:ro
      - ./prometheus/alerting_rules.yml:/etc/prometheus/alerting_rules.yml:ro
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=24h
      - --web.enable-lifecycle

  alertmanager:
    image: prom/alertmanager:latest
    container_name: alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml

  grafana:
    image: grafana/grafana:11.3.0
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /etc/grafana/provisioning/dashboards/overview.json
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus

volumes:
  postgres_outbox_data:
  postgres_inbox_data:
  postgres_dlq_data:
  kafka_data:
  prometheus_data:
  grafana_data:
